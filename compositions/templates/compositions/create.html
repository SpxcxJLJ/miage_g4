<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Liste des compositions</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
    <h1 class="mb-3">Liste des compositions</h1>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Titre</th>
                <th>Date</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for compo in compositions %}
            <tr>
                <td>{{ compo.id }}</td>
                <td>{{ compo.titre }}</td>
                <td>{{ compo.date_creation }}</td>
                <td><a href="#" class="btn btn-sm btn-primary">Voir</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
