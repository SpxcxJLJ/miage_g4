{% extends 'base.html' %}
{% block content %}

<h1>Rapport des matières</h1>

<form method="GET" class="row g-3 mb-4">

    <div class="col-md-4">
        <input type="text" name="code" class="form-control"
               placeholder="Code matière"
               value="{{ code_filter }}">
    </div>

    <div class="col-md-4">
        <input type="text" name="annee" class="form-control"
               placeholder="Année universitaire"
               value="{{ annee_filter }}">
    </div>

    <div class="col-md-4">
        <button class="btn btn-primary w-100">Filtrer</button>
    </div>

</form>

<table class="table table-striped table-bordered">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Code</th>
            <th>Intitulé</th>
            <th>Année universitaire</th>
            <th>Volume horaire</th>
        </tr>
    </thead>
    <tbody>
        {% for m in matieres %}
        <tr>
            <td>{{ m.id }}</td>
            <td>{{ m.code_matiere }}</td>
            <td>{{ m.intitule }}</td>
            <td>{{ m.annee_universitaire }}</td>
            <td>{{ m.volume_horaire }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<a href="{% url 'rapport_matieres_pdf' %}?code={{ code_filter }}&annee={{ annee_filter }}"
   class="btn btn-danger">
    Télécharger en PDF
</a>

{% endblock %}
